<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Md. Lavib Uddin Ashik | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #080808;
        font-family: "DM Sans", sans-serif;
        color: #fff;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #111;
      }
      ::-webkit-scrollbar-thumb {
        background: #ec4899;
        border-radius: 4px;
      }
      .syne {
        font-family: "Syne", sans-serif;
      }
      .pink {
        color: #ec4899;
      }
      .bg-card {
        background: #111218;
      }
      .border-card {
        border: 1px solid #1e1e2e;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes barFill {
        from {
          width: 0%;
        }
        to {
          width: var(--target);
        }
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      @keyframes pulse-pink {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.4);
        }
        50% {
          box-shadow: 0 0 0 12px rgba(236, 72, 153, 0);
        }
      }
      .animate-fadeInUp {
        animation: fadeInUp 0.7s ease forwards;
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
      .animate-pulse-pink {
        animation: pulse-pink 2s infinite;
      }
      .nav-link {
        position: relative;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: #ec4899;
        transition: width 0.3s ease;
      }
      .nav-link:hover::after,
      .nav-link.active::after {
        width: 100%;
      }
      .skill-bar {
        height: 6px;
        background: #1e1e2e;
        border-radius: 3px;
        overflow: hidden;
      }
      .skill-fill {
        height: 100%;
        background: linear-gradient(90deg, #ec4899, #f472b6);
        border-radius: 3px;
        width: 0%;
        transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .project-card {
        background: #111218;
        border: 1px solid #1e1e2e;
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.3s ease;
      }
      .project-card:hover {
        border-color: #ec4899;
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(236, 72, 153, 0.1);
      }
      .tag {
        background: rgba(236, 72, 153, 0.1);
        border: 1px solid rgba(236, 72, 153, 0.3);
        color: #ec4899;
        padding: 3px 10px;
        border-radius: 99px;
        font-size: 12px;
      }
      .btn-ghost {
        background: #1a1a2e;
        border: 1px solid #2e2e4e;
        color: #fff;
        padding: 8px 20px;
        border-radius: 99px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .btn-ghost:hover {
        border-color: #ec4899;
        color: #ec4899;
      }
      .btn-pink {
        background: #ec4899;
        color: #fff;
        padding: 8px 20px;
        border-radius: 99px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        border: none;
      }
      .btn-pink:hover {
        background: #db2777;
      }
      .glass {
        background: rgba(17, 18, 24, 0.8);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .hero-glow {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(236, 72, 153, 0.15) 0%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
      }
      .section-label {
        letter-spacing: 0.3em;
        font-size: 12px;
        color: #ec4899;
        font-weight: 600;
        text-transform: uppercase;
      }
      .contact-input {
        background: #1a1a2e;
        border: 1px solid #2e2e4e;
        color: #fff;
        padding: 12px 16px;
        border-radius: 10px;
        width: 100%;
        outline: none;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        transition: border 0.2s;
      }
      .contact-input:focus {
        border-color: #ec4899;
      }
      .contact-input::placeholder {
        color: #555;
      }
      .mobile-menu {
        display: none;
      }
      @media (max-width: 768px) {
        .desktop-nav {
          display: none;
        }
        .mobile-menu {
          display: block;
        }
      }
      .hamburger {
        background: none;
        border: none;
        cursor: pointer;
        color: #fff;
      }
      .mobile-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #080808;
        z-index: 999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }
    </style>
  </head>

      function App() {
        const [active, setActive] = React.useState("Home");
        const [mobileOpen, setMobileOpen] = React.useState(false);

        React.useEffect(() => {
          const handleScroll = () => {
            const sections = NAV_LINKS.map((l) => ({
              id: l,
              el: document.getElementById(l.toLowerCase()),
            }));
            const scrollY = window.scrollY + 100;
            for (let i = sections.length - 1; i >= 0; i--) {
              if (sections[i].el && sections[i].el.offsetTop <= scrollY) {
                setActive(sections[i].id);
                break;
              }
            }
          };
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);

        return (
          <div>
            <Navbar
              active={active}
              setActive={setActive}
              mobileOpen={mobileOpen}
              setMobileOpen={setMobileOpen}
            />
            <Hero />
            <Skills />
            <Projects />
            <Education />
            <Contact />
            <Footer />
          </div>
        );
      }
